<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- x-shader/x-vertex makes the red lines go away -->
    <script id="vertex-shader" type="x-shader/x-vertex">
        attribute vec4 vPosition;
        attribute vec4 vColor;
        varying vec4 fColor;

        // fog
        varying float vDistance;

        // for lighting
        attribute vec3 vNormal;
        uniform vec3 uLightDirection;
        varying float vLightDistance;

        // viewing and projection matrices
        uniform mat4 uViewMatrix;
        uniform mat4 uProjectionMatrix;
        uniform mat4 uModelMatrix;

        void main() {
            
            // Vertex position
            // position of the vertex relative to the camera
            vec4 viewSpacePosition = uViewMatrix * uModelMatrix * vPosition;
            
            // for 3D position of objects
            gl_Position = uProjectionMatrix * viewSpacePosition;
            
            // Fog
            // radial distance from the camera to the vertex
            vDistance = length(viewSpacePosition.xyz);
            
            // Blinn-Phong Lighting
            vec3 lightColor = vec3(1.0, 1.0, 1.0); // white light
            vec4 worldPosition = uModelMatrix * vPosition;
            vec3 lightDir = normalize(uLightDirection - worldPosition.xyz);
            vLightDistance = length(worldPosition.xyz - uLightDirection);
            vec3 lightDirView = normalize((uViewMatrix * vec4(lightDir, 0.0)).xyz); // light direction in view space
            vec3 normalView = normalize((uViewMatrix * uModelMatrix * vec4(vNormal, 0.0)).xyz); // normal in view space
            float a = 0.3;
            float b = 1.2;
            float c = 0.5;
            float distanceFactor = 1.0 / (a + b * vLightDistance + c * vLightDistance * vLightDistance);

            // ambient
            // k_a*L_a represented as one scalar
            float I_a = 0.5; // ambient intensity

            // diffuse
            float L_d = 200.0; // diffuse intensity
            float k_d = 1.0; // scaling factor (i think set based on material properties)

            // max(,0.0) prevents negative numbers so the dark side doesn't glow backwards
            float I_d = distanceFactor*k_d*max(dot(normalView, lightDirView), 0.0)*L_d;

            // specular
            float L_s = 0.0; // specular intensity
            float k_s = 1.0; 
            float shininess = 32.0;
            vec3 h = normalize(lightDirView - viewSpacePosition.xyz); // halfway vector
            float I_s = distanceFactor * k_s * max(pow(dot(normalView, h), shininess), 0.0) * L_s;

            vec3 finalColor = (vColor.rgb * (I_a + I_d) + vec3(I_s)) * lightColor; 
            // got the above expression that separates specular reflection from Gemini - the reasoning is that specular reflection should add the light color to the final color, while ambient and diffuse reflection should scale the vertex color by the light color

            fColor = vec4(finalColor, vColor.a);
        }
    </script>

    <script id="fragment-shader" type="x-shader/x-fragment">
        precision mediump float;
        varying vec4 fColor;
        varying float vDistance;  // fog
        uniform float uFogNear;
        uniform float uFogFar;
        uniform vec4 uFogColor;

        void main() {
            // gl_FragColor = fColor;

            float fogFactor = (uFogFar - vDistance) / (uFogFar - uFogNear);
            fogFactor = clamp(fogFactor, 0.0, 1.0);
            // mix() linearly interpolates based on the fog factor
            gl_FragColor = mix(uFogColor, fColor, fogFactor);
        }
    </script>
    <div class="container">
    <canvas id="gl-canvas" width="1000" height="800">Your browser doth not supporteth the Canvas element</canvas>

    <div class="controls">
        <div class="control-group">
            <h3>Movement speed</h3>
            <input type="range" id="speed-slider" min="1" max="5" value="2" step="1">
            <span id="speed-slider-val">2</span>
            <h3>Turning speed</h3>
            <input type="range" id="turning-slider" min="1" max="5" value="3" step="1">
            <span id="turning-slider-val">3</span>
        </div>
    </div>
    </div>
    <script src="initShaders.js"></script>
    <script src="webgl-utils.js"></script>
    <script src="common.js"></script>
    <script src="scene.js"></script>
</body>
</html>
