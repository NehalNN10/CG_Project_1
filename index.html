<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- x-shader/x-vertex makes the red lines go away -->
    <script id="vertex-shader" type="x-shader/x-vertex">
        attribute vec4 vPosition;
        attribute vec4 vColor;
        varying vec4 fColor;

        // for lighting
        attribute vec3 vNormal;
        uniform vec3 uLightDirection;

        // viewing and projection matrices
        uniform mat4 uViewMatrix;
        uniform mat4 uProjectionMatrix;
        uniform mat4 uModelMatrix;

        void main() {
            // for 3D position of objects
            gl_Position = uProjectionMatrix * uViewMatrix * uModelMatrix * vPosition;

            // rotate normal if model matrix includes rotation
            vec3 transformedNormal = normalize((uModelMatrix * vec4(vNormal, 0.0)).xyz);
            vec3 lightDir = normalize(uLightDirection);

            // dot product -> light intensity
            // max(0.0) prevents negative numbers so the dark side doesn't glow backwards
            float lightIntensity = max(1.5 * dot(transformedNormal, lightDir), 0.0);

            // ambient lighting to avoid pitch dark for dark side
            float ambientLight = 0.3; 

            // multiply gray by light intensity
            vec3 finalColor = vColor.rgb * (ambientLight + lightIntensity);

            fColor = vec4(finalColor, vColor.a);
        }
    </script>

    <script id="fragment-shader" type="x-shader/x-fragment">
        precision mediump float;
        varying vec4 fColor;

        void main() {
            gl_FragColor = fColor;
        }
    </script>

    <canvas id="gl-canvas" width="1000" height="800">Your browser doth not supporteth the Canvas element</canvas>

    <script src="initShaders.js"></script>
    <script src="webgl-utils.js"></script>
    <script src="common.js"></script>
    <script src="scene.js"></script>
</body>
</html>
