<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark"> <div class="app-container">
        <header class="top-bar">
            <h1>ڈراؤنا جنگل</h1>
            <button id="theme-toggle" class="theme-btn">☀️ Light Mode</button>
        </header>

        <main class="game-area">
            
            <div class="canvas-container">
                <canvas id="gl-canvas" width="1000" height="750">
                    Your browser doesn't support the Canvas element
                </canvas>
            </div>

            <aside class="controls-panel">
                <h2>Game Settings</h2>
                
                <div class="control-group">
                    <label>Walk Speed: <span id="speed-slider-val">2</span></label>
                    <input type="range" id="speed-slider" min="1" max="5" value="2">
                </div>

                <div class="control-group">
                    <label>Turn Speed: <span id="turning-slider-val">3</span></label>
                    <input type="range" id="turning-slider" min="1" max="5" value="3">
                </div>

                <div class="control-group">
                    <label>Fog Density: <span id="fog-slider-val">4</span></label>
                    <input type="range" id="fog-slider" min="1" max="16" value="14">
                </div>

                <div class="control-group">
                    <label>Field of View: <span id="fov-slider-val">45</span>°</label>
                    <input type="range" id="fov-slider" min="30" max="120" value="45">
                </div>

                <div class="control-group">
                    <label>Near Plane: <span id="near-slider-val">0.1</span></label>
                    <input type="range" id="near-slider" min="0.1" max="10.0" step="0.1" value="0.1">
                </div>

                <div class="control-group">
                    <label>Far Plane: <span id="far-slider-val">100.0</span></label>
                    <input type="range" id="far-slider" min="20.0" max="300.0" value="100.0">
                </div>

                <div class="instructions">
                    <h3>Controls</h3>
                    <p><b>W/A/S/D</b> - Move</p>
                    <p><b>Q/E</b> - Turn Left/Right</p>
                    <p><b>Up/Down</b> - Look Up/Down</p>
                    <p><b>Left/Right</b> - Roll Left/Right</p>
                    <p><b>Shift</b> - Sprint</p>
                    <p><b>Space / C</b> - Fly / Crouch</p>
                    <p><b>1/2/3</b> - Flat/Gouraud/Wireframe Shading</p>
                    <p><b>R</b> - Reset Camera</p>
                </div>
            </aside>
        </main>
    </div>

    <!-- x-shader/x-vertex makes the red lines go away -->
    <script id="vertex-shader" type="x-shader/x-vertex">
        attribute vec4 vPosition;
        attribute vec4 vColor;
        varying vec4 fColor;

        // fog
        varying float vDistance;

        // for lighting
        attribute vec3 vNormal;
        #define MAX_LIGHTS 20 
        struct Light {
            int type; // 0 for directional, 1 for spotlight
            vec3 position; // position in world
            vec3 color;
            vec3 direction; // pointing direction for spotlight
            
            // Attenuation coefficients (a, b, c)
            float constant;
            float linear;
            float quadratic;
            
            // Spotlight parameters
            float cutoff; // when to start decay
            float exponent; // how fast to decay
        };
        uniform Light uLights[MAX_LIGHTS];
        uniform int uNumLights;

        // viewing and projection matrices
        uniform mat4 uViewMatrix;
        uniform mat4 uProjectionMatrix;
        uniform mat4 uModelMatrix;

        varying vec2 vGrassUV;   // grass perlin noise

        void main() {
            
            // Vertex position
            // position of the vertex relative to the camera
            vec4 viewSpacePosition = uViewMatrix * uModelMatrix * vPosition;
            
            // for 3D position of objects
            gl_Position = uProjectionMatrix * viewSpacePosition;
            
            // Fog
            // radial distance from the camera to the vertex
            vDistance = length(viewSpacePosition.xyz);

            // grass perlin noise
            vec4 grassPosition = uModelMatrix * vPosition;
            vGrassUV = grassPosition.xz;
            
            // Blinn-Phong Lighting from multiple sources
            vec4 worldPosition = uModelMatrix * vPosition;
            vec3 normalView = normalize((uViewMatrix * uModelMatrix * vec4(vNormal, 0.0)).xyz); // normal in view space

            vec3 finalLighting = vec3(0.0);
            float I_a = 0.5; // ambient intensity

            for (int i = 0; i < MAX_LIGHTS; i++) {
                if (i >= uNumLights) 
                    break;
                
                vec3 lightPosition = uLights[i].position;
                vec3 lightDir = normalize(lightPosition - worldPosition.xyz); // vector from vertex to light source
                vec3 lightDirView = normalize((uViewMatrix * vec4(lightDir, 0.0)).xyz); // light direction in view space
                vec3 lightColor = uLights[i].color;
                float distance = length(worldPosition.xyz - lightPosition);

                float distanceFactor = 1.0 / (uLights[i].constant + uLights[i].linear * distance + uLights[i].quadratic * distance * distance);

                // diffuse
                float L_d = 5.0; // diffuse intensity
                float k_d = 1.0; // scaling factor (i think set based on material properties)
                float I_d = distanceFactor*k_d*max(dot(normalView, lightDirView), 0.0)*L_d;

                // specular
                float L_s = 0.5; // specular intensity
                float k_s = 1.0;
                float shininess = 16.0; // more is less shiny
                vec3 h = normalize(lightDirView - viewSpacePosition.xyz); // halfway vector
                float I_s = distanceFactor * k_s * pow(max(dot(normalView, h), 0.0), shininess) * L_s;

                // if spotlight, then special effect 
                float spotIntensity = 1.0;
                if (uLights[i].type == 1)
                {
                    float theta = dot(lightDir, normalize(-uLights[i].direction)); // angle between light direction and vector from vertex to light
                    if (theta > cos(radians(uLights[i].cutoff))) // if within cutoff angle
                    {
                        spotIntensity = pow(theta, uLights[i].exponent); // apply spotlight effect
                    }
                    else
                    {
                        spotIntensity = 0.0; // outside of spotlight cone
                    }
                }

                // specular lighting should add the color of the light source, not amplify the color of the object
                finalLighting += (vColor.rgb * (I_d) + vec3(I_s)) * lightColor * spotIntensity;

            }
            vec3 finalColor = finalLighting + vColor.rgb * I_a; // add ambient lighting after all the light effects
            
            fColor = vec4(finalColor, vColor.a);
        }
    </script>

    <script id="fragment-shader" type="x-shader/x-fragment">
        precision mediump float;
        varying vec4 fColor;
        varying float vDistance;  // fog
        uniform float uFogNear;
        uniform float uFogFar;
        uniform vec4 uFogColor;

        // grass perlin noise and toggle
        varying vec2 vGrassUV;
        uniform float uIsGrass;

        // psuedorandom gen
        vec2 random2(vec2 st){
            st = vec2( dot(st,vec2(127.1,311.7)), dot(st,vec2(269.5,183.3)) );
            return -1.0 + 2.0*fract(sin(st)*43758.5453123);
        }

        // perlin noise
        float noise(vec2 st) {
            vec2 i = floor(st);
            vec2 f = fract(st);
            vec2 u = f*f*(3.0-2.0*f);
            
            return mix( mix( dot( random2(i + vec2(0.0,0.0) ), f - vec2(0.0,0.0) ), dot( random2(i + vec2(1.0,0.0) ), f - vec2(1.0,0.0) ), u.x), mix( dot( random2(i + vec2(0.0,1.0) ), f - vec2(0.0,1.0) ), dot( random2(i + vec2(1.0,1.0) ), f - vec2(1.0,1.0) ), u.x), u.y);
        }

        void main() {
            vec4 finalBaseColor = fColor;

            // apply the texture if this pixel belongs to the grass
            if (uIsGrass > 0.5) {
                // scale to make the noise patches larger or smaller. 
                float n = noise(vGrassUV * 0.9); 
                
                // Noise returns [-1.0 to 1.0]. Shift it to [0.0 to 1.0]
                n = n * 0.5 + 0.5; 
                
                vec3 brownColor = vec3(69, 44, 29)/255.0;
                vec3 grassColor = vec3(0.1, 0.25, 0.1);
                
                // mix grass and brown based on noise
                vec3 terrainTexture = mix(grassColor, brownColor, n);
                finalBaseColor.rgb = (fColor.rgb / grassColor) * terrainTexture;
            }

            float fogFactor = (uFogFar - vDistance) / (uFogFar - uFogNear);
            fogFactor = clamp(fogFactor, 0.0, 1.0);
            // mix() linearly interpolates based on the fog factor and the perlin noise factor in case of grass
            gl_FragColor = mix(uFogColor, finalBaseColor, fogFactor);
        }
    </script>
    
    </div>
    <script src="initShaders.js"></script>
    <script src="webgl-utils.js"></script>
    <script src="common.js"></script>
    <script src="scene.js"></script>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        toggleBtn.addEventListener('click', () => {
            const body = document.body;
            if (body.getAttribute('data-theme') === 'dark') {
                body.setAttribute('data-theme', 'light');
                toggleBtn.textContent = '🌙 Dark Mode';
            } else {
                body.setAttribute('data-theme', 'dark');
                toggleBtn.textContent = '☀️ Light Mode';
            }
        });
    </script>
</body>
</html>
